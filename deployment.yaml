apiVersion: apps/v1
kind: Deployment
metadata:
  name: about-me-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: about-me
  template:
    metadata:
      labels:
        app: about-me
    spec:
      containers:
      - name: about-me-container
        image: yourdockerhubusername/about-me-website:latest
        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: about-me-service
spec:
  type: NodePort
  selector:
    app: about-me
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30010
